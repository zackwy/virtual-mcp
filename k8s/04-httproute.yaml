# Exposes the federated Virtual MCP backend at path /mcp on the gateway.
# Clients connect to http://<gateway>/mcp and see the union of all targets.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  rules:
    - backendRefs:
        - name: mcp
          group: enterpriseagentgateway.solo.io
          kind: EnterpriseAgentgatewayBackend
      matches:
        - path:
            type: PathPrefix
            value: /mcp
